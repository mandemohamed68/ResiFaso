<!doctype html>
<html lang="en">
  <head>
    <script>
      window.onerror = function(message, source, lineno, colno, error) {
        var errDiv = document.createElement('div');
        errDiv.style = 'position:fixed;top:0;left:0;width:100%;background:red;color:white;z-index:999999;padding:20px;font-family:sans-serif;box-sizing:border-box;';
        errDiv.innerHTML = '<h2>Application Error</h2><p>' + message + '</p><pre style="white-space:pre-wrap;font-size:12px;background:#800;padding:10px;overflow:auto;">' + (error && error.stack ? error.stack : source + ':' + lineno + ':' + colno) + '</pre>';
        document.body.prepend(errDiv);
      };
      window.addEventListener('unhandledrejection', function(event) {
        var errDiv = document.createElement('div');
        errDiv.style = 'position:fixed;top:0;left:0;width:100%;background:red;color:white;z-index:999999;padding:20px;font-family:sans-serif;box-sizing:border-box;';
        errDiv.innerHTML = '<h2>Unhandled Promise Rejection</h2><p>' + (event.reason && event.reason.message ? event.reason.message : event.reason) + '</p><pre style="white-space:pre-wrap;font-size:12px;background:#800;padding:10px;overflow:auto;">' + (event.reason && event.reason.stack ? event.reason.stack : '') + '</pre>';
        document.body.prepend(errDiv);
      });
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <title>ResiFaso</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
